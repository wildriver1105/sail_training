<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sail Training Hub</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛵</text></svg>" />
</head>
<body>
  <div class="sky"></div>
  <main>
    <header class="hero">
      <h1><span class="wave">⛵</span> Sail Training</h1>
      <p class="tagline">세일링 트레이닝 앱 모음 — 카드를 눌러 시작하세요</p>
      <p class="host-hint" id="hostHint"></p>
    </header>

    <section class="grid" id="grid" aria-live="polite">
      <p class="loading">불러오는 중…</p>
    </section>

    <footer class="foot">
      <span id="footHost"></span>
    </footer>
  </main>

  <script>
    // 현재 접속한 호스트명 기준으로 각 앱 링크를 만든다.
    // localhost로 보면 localhost:PORT, sail.local로 보면 sail.local:PORT 로 자동 매칭.
    const host = location.hostname || 'localhost';
    const FRAME_W = 1280; // iframe 논리 너비 (축소 비율 계산 기준)

    // 앱 서버가 떠 있는지 확인 (cross-origin이라 no-cors opaque; 연결되면 resolve, 거부되면 reject)
    function probe(url) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 3500);
      return fetch(url, { mode: 'no-cors', signal: ctrl.signal })
        .then(() => true).catch(() => false).finally(() => clearTimeout(t));
    }

    // iframe 썸네일을 카드 너비에 맞춰 축소
    function fitFrame(frame, thumb) {
      const scale = thumb.clientWidth / FRAME_W;
      frame.style.transform = `scale(${scale})`;
    }

    function card(app) {
      const url = `http://${host}:${app.port}`;
      const el = document.createElement('a');
      el.className = 'card';
      el.href = url;
      el.style.setProperty('--accent', app.accent || '#1f6feb');
      el.innerHTML = `
        <div class="thumb">
          <div class="thumb-fallback">
            <span class="fb-icon">${app.icon || '⛵'}</span>
            <span class="fb-status">미리보기 불러오는 중…</span>
          </div>
        </div>
        <div class="card-bar">
          <span class="bar-title">${app.icon || '⛵'} ${app.title}</span>
          <span class="bar-port">:${app.port}</span>
        </div>`;

      const thumb = el.querySelector('.thumb');
      const status = el.querySelector('.fb-status');

      // 앱이 떠 있으면 라이브 iframe 썸네일, 아니면 오프라인 표시
      probe(url).then(up => {
        if (up) {
          const frame = document.createElement('iframe');
          frame.className = 'thumb-frame';
          frame.src = url;
          frame.loading = 'lazy';
          frame.scrolling = 'no';
          frame.tabIndex = -1;
          frame.setAttribute('aria-hidden', 'true');
          frame.setAttribute('title', app.title + ' 미리보기');
          frame.addEventListener('load', () => el.classList.add('thumb-ready'));
          thumb.appendChild(frame);
          fitFrame(frame, thumb);
          window.addEventListener('resize', () => fitFrame(frame, thumb));
        } else {
          el.classList.add('offline');
          status.textContent = '실행 중이 아님 · 클릭해 열기';
        }
      });
      return el;
    }

    fetch('/config.json')
      .then(r => r.json())
      .then(cfg => {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        (cfg.apps || []).forEach(app => grid.appendChild(card(app)));
        const port = cfg.launcherPort || location.port || 3000;
        document.getElementById('hostHint').textContent = `이 화면 주소: http://${host}:${port}`;

        const foot = document.getElementById('footHost');
        const mdnsUrl = `http://${cfg.host || 'sail.local'}:${port}`;
        if (cfg.lanIP) {
          foot.innerHTML =
            `같은 WiFi의 다른 기기는 <b>http://${cfg.lanIP}:${port}</b> 로 접속하세요` +
            `<br><span style="opacity:.7">(${mdnsUrl} 도 가능하지만, 일부 네트워크에선 LAN IP가 더 확실합니다)</span>`;
        } else {
          foot.textContent = `같은 WiFi의 다른 기기는 ${mdnsUrl} 으로 접속하세요`;
        }
      })
      .catch(err => {
        document.getElementById('grid').innerHTML =
          `<p class="loading">설정을 불러오지 못했습니다: ${err}</p>`;
      });
  </script>
</body>
</html>
